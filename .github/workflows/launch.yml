name: Launch Nimbus-24

on:
  schedule:
    - cron: '0 23 18 3 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Swap to launch site
        run: |
          mkdir -p _archive
          if [ -f index.html ]; then
            cp index.html _archive/coming-soon.html
          fi
          if [ -d _launch ]; then
            cp _launch/index.html ./index.html
            cp _launch/proche-aidant.html ./proche-aidant.html
            cp _launch/lektes.html ./lektes.html
          else
            echo "ERROR: _launch/ folder not found"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Launch Nimbus-24" || echo "No changes"
          git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install resend

      - name: Send waitlist notification emails
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -f _launch/waitlist_emails.csv ]; then
            cp _launch/waitlist_emails.csv ./waitlist_emails.csv
            python _launch/send_launch_emails.py
          else
            echo "No waitlist_emails.csv found — skipping email send"
          fi
